services:
  api:
    build: .
    image: cardwise-api:latest
    container_name: cardwise-api
    ports:
      - "8000:8000"
    environment:
      # Persist SQLite to the mounted volume.
      DATABASE_URL: "sqlite:////data/cardwise.db"
      ENVIRONMENT: "production"
      LOG_LEVEL: "INFO"
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      AUTO_CREATE_TABLES: "false"
      TRUST_PROXY_HEADERS: "false"
    volumes:
      - cardwise-data:/data
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true

volumes:
  cardwise-data:
