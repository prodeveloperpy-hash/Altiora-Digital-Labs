services:
  api:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/cardwise.db
      ENVIRONMENT: production
      AUTO_CREATE_TABLES: "true"
      AUTO_SEED: "true"
      CORS_ORIGINS: '["http://localhost:8080"]'
    volumes:
      - cardwise-data:/data
    restart: unless-stopped
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    build: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  cardwise-data:
